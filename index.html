<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極・原稿用紙要約アプリ</title>
    <style>
        :root { --paper-color: #fff9ed; --grid-color: #ff9e9e; }
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; background-color: #d7d7d7; padding-top: 20px; }
        
        .container { background: var(--paper-color); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 90%; max-width: 480px; text-align: center; border: 2px solid #b56565; position: relative; overflow: hidden; }
        #timer { font-size: 2.5rem; font-weight: bold; color: #37474f; margin-bottom: 0.5rem; }
        
        .genko-wrapper { background-color: white; border: 1px solid var(--grid-color); display: inline-block; margin-bottom: 10px; }
        textarea { width: 401px; height: 401px; border: none; resize: none; font-size: 24px; line-height: 40px; letter-spacing: 16px; padding: 0 0 0 8px; background-image: linear-gradient(to bottom, transparent 39px, var(--grid-color) 40px), linear-gradient(90deg, transparent 39px, var(--grid-color) 40px); background-size: 40px 40px; font-family: 'Courier New', monospace; display: block; outline: none; }
        
        /* 判定結果画面 */
        #resultOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.9); z-index: 100;
        }
        .result-card { background: white; width: 80%; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 4px solid #ccc; }
        #resIcon { font-size: 4rem; margin-bottom: 10px; }
        #resTitle { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        #resDetails { font-size: 0.85rem; text-align: left; background: #fdfdfd; padding: 10px; border-radius: 5px; line-height: 1.5; margin-bottom: 15px; min-height: 60px; }

        .btn-group { display: flex; gap: 8px; width: 100%; }
        button { flex: 1; background-color: #2196f3; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        #startBtn { background-color: #ff9800; }
        .retry-btn { background-color: #555; width: 100%; }
        button:disabled { background-color: #b0bec5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer">30:00</div>
    
    <div class="genko-wrapper">
        <textarea id="summaryInput" maxlength="100" placeholder="「開始」でスタート" disabled></textarea>
    </div>

    <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#b56565; margin-bottom:10px;">
        <span id="statusLabel">準備完了</span>
        <span><span id="currentCount">0</span> / 100文字</span>
    </div>

    <div class="btn-group">
        <button id="startBtn" onclick="startTraining()">トレーニング開始</button>
        <button id="submitBtn" onclick="analyzeAndSubmit()" disabled>判定して送信</button>
    </div>

    <div id="resultOverlay">
        <div class="result-card" id="resultCard">
            <div id="resIcon"></div>
            <div id="resTitle"></div>
            <div id="resDetails"></div>
            <button class="retry-btn" onclick="closeResult()">もう一度挑戦</button>
        </div>
    </div>
</div>

<script>
    let timerInterval;

    // 開始ボタンの処理
    function startTraining() {
        const input = document.getElementById('summaryInput');
        input.disabled = false;
        input.focus();
        document.getElementById('startBtn').disabled = true;
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('statusLabel').textContent = "計測中...";

        let timeLeft = 1800; // 30分
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("時間切れです！");
            }
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }

    // 判定ボタンの処理（外部ライブラリ不要）
    function analyzeAndSubmit() {
        const text = document.getElementById('summaryInput').value.trim();
        if (!text) {
            alert("文章を入力してください。");
            return;
        }

        let errors = [];

        // 1. です・ますチェック
        if (/[ですます]/.test(text)) {
            errors.push("・「です・ます」が含まれています。");
        }

        // 2. NGワード
        const ngWords = ["えーと", "あのー", "なんか", "マジで", "ヤバい", "多分"];
        ngWords.forEach(word => {
            if (text.indexOf(word) !== -1) errors.push(`・不要な言葉「${word}」があります。`);
        });

        // 3. 文末チェック（句点なし、または不自然な終わり）
        const lastChar = text.slice(-1);
        if (!/[。た、るいだない]/.test(lastChar)) {
            errors.push("・文末を正しく（。や、だ・た等で）締めてください。");
        }

        // 結果を表示
        const overlay = document.getElementById('resultOverlay');
        const icon = document.getElementById('resIcon');
        const title = document.getElementById('resTitle');
        const details = document.getElementById('resDetails');
        const card = document.getElementById('resultCard');

        overlay.style.display = "flex";

        if (errors.length === 0) {
            icon.textContent = "🉐";
            title.textContent = "合格！";
            title.style.color = "#2e7d32";
            card.style.borderColor = "#4caf50";
            details.innerHTML = "素晴らしい！「だ・である」調で、簡潔にまとまっています。";
        } else {
            icon.textContent = "㊙️";
            title.textContent = "不合格...";
            title.style.color = "#c62828";
            card.style.borderColor = "#f44336";
            details.innerHTML = "<strong>以下の点を修正してください：</strong><br>" + errors.join("<br>");
        }
    }

    function closeResult() {
        document.getElementById('resultOverlay').style.display = "none";
    }

    // 文字数カウント
    document.getElementById('summaryInput').addEventListener('input', function() {
        document.getElementById('currentCount').textContent = this.value.length;
    });
</script>
</body>
</html>
