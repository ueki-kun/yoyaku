<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極・原稿用紙要約アプリ(軽量版)</title>
    <style>
        :root { --paper-color: #fff9ed; --grid-color: #ff9e9e; }
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; background-color: #d7d7d7; padding-top: 20px; }
        .container { background: var(--paper-color); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 90%; max-width: 480px; text-align: center; border: 2px solid #b56565; }
        #timer { font-size: 2.5rem; font-weight: bold; color: #37474f; margin-bottom: 0.5rem; }
        #resultIcon { font-size: 4rem; line-height: 1; margin: 5px 0; min-height: 1.2em; }
        .genko-wrapper { background-color: white; border: 1px solid var(--grid-color); display: inline-block; }
        textarea { width: 401px; height: 401px; border: none; resize: none; font-size: 24px; line-height: 40px; letter-spacing: 16px; padding: 0 0 0 8px; background: #ffffff; background-image: linear-gradient(to bottom, transparent 39px, var(--grid-color) 40px), linear-gradient(90deg, transparent 39px, var(--grid-color) 40px); background-size: 40px 40px; font-family: 'Courier New', monospace; display: block; }
        .info-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 0.85rem; color: #b56565; }
        #feedbackMsg { font-size: 0.8rem; text-align: left; margin: 10px 0; min-height: 4em; padding: 10px; border: 1px dashed var(--grid-color); background: rgba(255,255,255,0.6); line-height: 1.4; white-space: pre-wrap; }
        button { background-color: #ff9800; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer">30:00</div>
    <div id="resultIcon"></div>
    <div class="genko-wrapper">
        <textarea id="summaryInput" maxlength="100" placeholder="入力してください"></textarea>
    </div>
    <div class="info-row">
        <span>ステータス: 動作中(軽量モード)</span>
        <span><span id="currentCount">0</span> / 100文字</span>
    </div>
    <div id="feedbackMsg"></div>
    <button id="submitBtn" onclick="analyzeSimple()">判定する</button>
</div>

<script>
    // 外部ファイル(kuromoji)を使わず、自前で判定ロジックを書く（PCブロック回避）
    function analyzeSimple() {
        const text = document.getElementById('summaryInput').value.trim();
        if (!text) return;

        let errors = [];
        
        // 1. 禁止語句チェック
        const ngWords = ["えーと", "あのー", "なんか", "多分", "マジで"];
        ngWords.forEach(word => {
            if (text.includes(word)) errors.push(`・話し言葉「${word}」が含まれています`);
        });

        // 2. です・ますチェック（簡易）
        if (text.endsWith("です") || text.endsWith("ます") || text.includes("でした") || text.includes("ました")) {
            errors.push("・「です・ます」調になっています。「だ・である」に直してください");
        }

        // 3. 体言止め・文末チェック（簡易）
        const endChar = text.slice(-1);
        const okEnd = ["た", "る", "ない", "だ", "。"];
        if (!okEnd.includes(endChar) && !errors.length) {
            errors.push("・文末が不自然です。句点（。）で終わるか、適切な動詞で終えてください");
        }

        const iconArea = document.getElementById('resultIcon');
        const msgArea = document.getElementById('feedbackMsg');

        if (errors.length === 0) {
            iconArea.textContent = "○";
            iconArea.style.color = "#4caf50";
            msgArea.innerHTML = "<strong>合格！</strong> 素晴らしい要約です。";
        } else {
            iconArea.textContent = "×";
            iconArea.style.color = "#f44336";
            msgArea.innerHTML = "<strong>改善点：</strong><br>" + errors.join("<br>");
        }
    }

    document.getElementById('summaryInput').addEventListener('input', function() {
        document.getElementById('currentCount').textContent = this.value.length;
    });
</script>
</body>
</html>
